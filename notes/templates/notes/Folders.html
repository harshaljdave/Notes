{% extends "notes/layout.html" %}
{% load customfilter %}
{% load static %}

{% block body %}
    <div class="container-fluid px-2 px-md-4">
        <!-- Header Section -->
        <div class="row justify-content-between align-items-center my-3">
            <div class="col-12">
                <h1 class="h2">Folders</h1>
            </div>
        </div>

        <!-- Folders Grid -->
        <div class="row g-3">
            {% for folder in Folders %}
            <div class="col-12 col-sm-6 col-lg-4">
    <div class="bg-secondary-subtle rounded p-3 h-100" id="folder-card-{{folder.id}}">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor"
                    class="bi bi-folder" viewBox="0 0 16 16">
                    <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a1.99 1.99 0 0 1 .342-1.31zM2.19 4a1 1 0 0 0-.996 1.09l.637 7a1 1 0 0 0 .995.91h10.348a1 1 0 0 0 .995-.91l.637-7A1 1 0 0 0 13.81 4H2.19zm4.69-1.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981l.006.139C1.72 3.042 1.95 3 2.19 3h5.396l-.707-.707z" />
                </svg>
                <a class="text-dark link-underline link-underline-opacity-0 text-break" 
                   href="{% url 'view_folder' folder.id %}">
                    {{folder.name}}
                </a>
            </div>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteFolder({{folder.id}})" title="Delete Folder">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash-fill" viewBox="0 0 16 16">
                        <path d="M2.5 1a1 1 0 0 0-1 1v1a1 1 0 0 0 1 1H3v9a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V4h.5a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H10a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1zm3 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5M8 5a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7A.5.5 0 0 1 8 5m3 .5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 1 0"/>
                    </svg>
            </button>
        </div>
    </div>
</div>
            {% empty %}
            <div class="col-12 text-center">
                <h2 class="text-muted">No Folders</h2>
            </div>
            {% endfor %}
        </div>

        <!-- Add Folder Button -->
        <button class="btn btn-primary rounded-circle position-fixed bottom-0 end-0 mb-4 me-4 shadow" 
                style="width: 56px; height: 56px;"
                data-bs-toggle="modal" 
                data-bs-target="#newFolderModal">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                class="bi bi-plus" viewBox="0 0 16 16">
                <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
            </svg>
        </button>

        <!-- New Folder Modal -->
        <div class="modal fade" id="newFolderModal" tabindex="-1" aria-labelledby="CreateFolder" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="CreateFolder">New Folder</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="newFolderForm">
                            <div class="mb-3">
                                <label class="form-label">Folder Name:</label>
                                <input type="text" required id="FolderName" class="form-control">
                            </div>
                            <div class="modal-footer px-0 pb-0">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary" data-bs-dismiss="modal"
                                    onclick="CreateFolder()">Create</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
     <div class="toast-container position-fixed top-0 end-0 p-3">
      <div id="liveToast" class="toast text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
          <strong class="me-auto">Folders</strong>
          <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body" id="toast-body" >
        </div>
      </div>
    </div>
{% endblock %}

{% block script %}
<script src="{% static 'notes/FolderFuntions.js' %}"></script>
{% endblock %}
